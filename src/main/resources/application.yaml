spring:
  application:
    name: banco-digital

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  web:
    cors:
      allowed-origins: "http://localhost:3000,https://banco-digital-front-one.vercel.app"

server:
  port: ${PORT:8080}